<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  >
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <meta name="theme-color" content="#07121d">
  <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>

  {% if request.session.get("authenticated") %}
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brandmark">W2</span>
      <span>
        <strong>WebbBuilder Studio v2</strong>
        <small>Bygg · förhandsgranska · finslipa</small>
      </span>
    </a>

    <nav>
      <a href="/">Projekt</a>
      <a href="/#new">Nytt projekt</a>
      <form method="post" action="/logout">
        <button type="submit" class="nav-button">Logga ut</button>
      </form>
    </nav>
  </header>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js?v=2"></script>
</body>
</html>
