<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <meta name="description" content="WebbBuilder Studio v2 – projekt och publika förhandsvisningar av hemsidor och webbappar.">
  <meta name="theme-color" content="#07121d">
  <link rel="stylesheet" href="/static/styles.css?v=6">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="WebbBuilder Studio v2 – startsida">
      <span class="brandmark">W2</span>
      <span>
        <strong>WebbBuilder Studio v2</strong>
        <small>Projekt · preview · utveckling</small>
      </span>
    </a>

    <nav aria-label="Huvudnavigation">
      <a href="/#projekt">Projekt</a>
      <a href="https://webutvecklare.se/" target="_blank" rel="noopener noreferrer">webutvecklare.se</a>
      {% if is_admin %}
        <a href="/#new">Nytt projekt</a>
        <form method="post" action="/logout">
          <button type="submit" class="nav-button">Logga ut</button>
        </form>
      {% else %}
        <a href="/login">Admin</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <strong>WebbBuilder Studio v2</strong>
      <div class="footer-links">
        <a href="https://webutvecklare.se/" target="_blank" rel="noopener noreferrer">webutvecklare.se</a>
      </div>
    </div>
  </footer>

  <script src="/static/app.js?v=6"></script>
</body>
</html>
