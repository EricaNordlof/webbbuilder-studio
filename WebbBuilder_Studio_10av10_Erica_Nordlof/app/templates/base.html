<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <meta name="theme-color" content="#07111b">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">
    <span class="brandmark">W</span>
    <span>
      <strong>{{ app_name }}</strong>
      <small>Bygg · finslipa · publicera</small>
    </span>
  </a>

  <nav>
    <a href="/">Projekt</a>
    <a href="/projects/new">Nytt projekt</a>
    <a href="/integrations">Integrationer</a>
    <form method="post" action="/logout">
      <button class="linkbutton" type="submit">Logga ut</button>
    </form>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<script src="/static/app.js"></script>
</body>
</html>
