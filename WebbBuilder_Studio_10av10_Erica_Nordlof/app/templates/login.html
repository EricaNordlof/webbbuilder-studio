<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Logga in · {{ app_name }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-body">
<section class="login-card">
  <span class="brandmark large">W</span>
  <h1>{{ app_name }}</h1>
  <p>Din privata byggstudio för webbappar och hemsidor.</p>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Lösenord<input type="password" name="password" required autofocus autocomplete="current-password"></label>
    <button class="primary" type="submit">Öppna byggstudion</button>
  </form>
</section>
</body>
</html>
