services:
  - type: web
    name: webbbuilder-studio
    runtime: docker
    plan: free
    region: oregon

    rootDir: WebbBuilder_Studio_10av10_Erica_Nordlof
    dockerfilePath: ./Dockerfile
    dockerContext: .

    healthCheckPath: /health

    envVars:
      # ======================================================
      # APP
      # ======================================================

      - key: APP_NAME
        value: WebbBuilder Studio

      - key: APP_PASSWORD
        sync: false

      - key: SESSION_SECRET
        generateValue: true

      - key: SESSION_SECURE
        value: "true"

      # ======================================================
      # OPENAI
      # ======================================================

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_MODEL
        value: gpt-5-mini

      - key: OPENAI_REQUEST_TIMEOUT
        value: "180"

      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "20000"

      - key: OPENAI_REASONING_EFFORT
        value: low

      - key: GENERATION_TIMEOUT_SECONDS
        value: "210"

      # ======================================================
      # GITHUB
      # ======================================================

      - key: GITHUB_TOKEN
        sync: false

      - key: GITHUB_OWNER
        value: EricaNordlof

      # ======================================================
      # RENDER
      # ======================================================

      - key: RENDER_API_KEY
        sync: false

      - key: RENDER_OWNER_ID
        sync: false

      - key: RENDER_REGION
        value: frankfurt

      # ======================================================
      # VERCEL
      # ======================================================

      - key: VERCEL_TOKEN
        sync: false

      - key: VERCEL_TEAM_ID
        sync: false

      # ======================================================
      # DATABASE
      #
      # Använder befintliga Render PostgreSQL-instansen
      # "flowforge-db".
      #
      # WebbBuilder skapar alltså INTE en andra gratis
      # PostgreSQL-instans.
      #
      # connectionString är Render-databasens privata
      # PostgreSQL-URL och sätts automatiskt som DATABASE_URL.
      # ======================================================

      - key: DATABASE_URL
        fromDatabase:
          name: flowforge-db
          property: connectionString

      # ======================================================
      # LOCAL SQLITE FALLBACK
      #
      # Den här används endast när DATABASE_URL saknas,
      # exempelvis vid lokal utveckling.
      # På Render används PostgreSQL.
      # ======================================================

      - key: DATABASE_PATH
        value: ./storage/webbbuilder.db
