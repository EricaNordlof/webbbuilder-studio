services:
  - type: web
    name: webbbuilder-studio
    runtime: docker
    plan: free
    region: oregon

    rootDir: WebbBuilder_Studio_10av10_Erica_Nordlof
    dockerfilePath: ./Dockerfile
    dockerContext: .

    healthCheckPath: /health

    envVars:
      - key: APP_NAME
        value: WebbBuilder Studio

      - key: APP_PASSWORD
        sync: false

      - key: SESSION_SECRET
        generateValue: true

      - key: SESSION_SECURE
        value: "true"

      # ======================================================
      # OPENAI
      # ======================================================

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_MODEL
        value: gpt-5-mini

      - key: OPENAI_REQUEST_TIMEOUT
        value: "180"

      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "20000"

      - key: OPENAI_REASONING_EFFORT
        value: low

      - key: GENERATION_TIMEOUT_SECONDS
        value: "210"

      # ======================================================
      # GITHUB
      # ======================================================

      - key: GITHUB_TOKEN
        sync: false

      - key: GITHUB_OWNER
        value: EricaNordlof

      # ======================================================
      # RENDER
      # ======================================================

      - key: RENDER_API_KEY
        sync: false

      - key: RENDER_OWNER_ID
        sync: false

      - key: RENDER_REGION
        value: frankfurt

      # ======================================================
      # VERCEL
      # ======================================================

      - key: VERCEL_TOKEN
        sync: false

      - key: VERCEL_TEAM_ID
        sync: false

      # ======================================================
      # DATABASE
      #
      # Render sätter DATABASE_URL automatiskt till den
      # interna anslutningssträngen för PostgreSQL-databasen.
      #
      # db.py använder PostgreSQL när DATABASE_URL finns.
      # SQLite används endast som fallback lokalt.
      # ======================================================

      - key: DATABASE_URL
        fromDatabase:
          name: webbbuilder-db
          property: connectionString


# ============================================================
# POSTGRESQL
# ============================================================

databases:
  - name: webbbuilder-db
    plan: free
    region: oregon

    databaseName: webbbuilder
    user: webbbuilder

    postgresMajorVersion: "18"

    # Databasen ska endast nås från Render-tjänster
    # via det privata nätverket.
    ipAllowList: []
